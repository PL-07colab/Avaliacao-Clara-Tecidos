<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação de Atendimento - Clara Tecidos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="Logo Clara Tecidos.jpg" alt="Clara Tecidos & Malhas" class="logo">
        <h1>Avaliação de Atendimento</h1>
        <p>Sua opinião é importante para melhor lhe atendermos!</p>
        <form id="evaluationForm">
            <label for="vendedora" class="label-vendedora">Selecione o colaborador(a) responsável pelo seu atendimento:</label>
            <select id="vendedora" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="Batista">Batista</option>
                <option value="Carol">Carol</option>
                <option value="Daci">Daci</option>
                <option value="Eliana">Eliana</option>
                <option value="Ellem">Ellem</option>
                <option value="Erika">Érika</option>
                <option value="Ivana">Ivana</option>
                <option value="katia">Kátia</option>
                <option value="Luane">Luane</option>
                <option value="Marcia">Márcia</option>
                <option value="Olisses">Olisses</option>
                <option value="Regiane">Regiane</option>
                <option value="Rosangela">Rosângela</option>
                <option value="Sirleia">Sirléia</option>
            </select>
            <div class="stars">
                <input type="radio" name="star" id="star5" value="5"><label for="star5">★</label>
                <input type="radio" name="star" id="star4" value="4"><label for="star4">★</label>
                <input type="radio" name="star" id="star3" value="3"><label for="star3">★</label>
                <input type="radio" name="star" id="star2" value="2"><label for="star2">★</label>
                <input type="radio" name="star" id="star1" value="1" required><label for="star1">★</label>
            </div>
            <textarea id="comentario" placeholder="Conte-nos o que achou..."></textarea>
            <button type="submit">Enviar Avaliação</button>
        </form>
        <div id="thanksMessage" style="display: none;">
            <h2 style="color: #102d8f;">Muito obrigado!</h2>
            <p>Sua avaliação foi recebida com sucesso. A Clara Tecidos agradece a sua preferência!</p>
            <button onclick="window.location.reload()" style="margin-top: 20px;">Nova Avaliação</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
