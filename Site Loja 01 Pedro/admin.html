<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Clara Tecidos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { 
            max-width: 1000px; 
            margin: 20px auto; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 15px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: none; 
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #102d8f; color: white; }
        
        .filter-section { 
            margin-bottom: 20px; 
            display: flex; 
            gap: 15px; 
            align-items: flex-end; 
            flex-wrap: wrap;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .stats-box { margin-bottom: 20px; font-weight: bold; color: #102d8f; font-size: 1.2rem; }
        
        input[type="date"], select { 
            padding: 8px; 
            border-radius: 5px; 
            border: 1px solid #ccc; 
            height: 40px; 
            box-sizing: border-box; 
            font-family: inherit;
            font-size: 14px;
            min-width: 150px;
        }
        #btnLimpar { 
            height: 40px; 
            padding: 0 15px; 
            background: #6c757d; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
        }
        #modalSenhaClara {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 380px;
            width: 90%;
        }
        .modal-box h2 { color: #102d8f; margin-bottom: 10px; }
        .modal-box input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 18px;
            text-align: center;
            box-sizing: border-box;
        }
        .modal-box button {
            width: 100%;
            padding: 14px;
            background: #102d8f;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="modalSenhaClara">
        <div class="modal-box">
            <h2>Acesso Restrito</h2>
            <p>Digite a senha da Clara Tecidos:</p>
            <input type="password" id="campoSenhaClara" placeholder="Digite aqui...">
            <button id="btnAcessarClara">Entrar no Painel</button>
        </div>
    </div>

    <div class="admin-container" id="painelConteudo">
        <h1>Relatório de Avaliações - Clara Tecidos</h1>
        
        <div class="stats-box">
            Total de Avaliações Filtradas: <span id="totalAvaliacoes">0</span>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <label>Vendedora:</label>
                <select id="filtroVendedora">
                    <option value="todos">Todas</option>
                    <option value="Batista">Batista</option>
                    <option value="Carol">Carol</option>
                    <option value="Daci">Daci</option>
                    <option value="Eliana">Eliana</option>
                    <option value="Ellem">Ellem</option>
                    <option value="Erika">Érika</option>
                    <option value="Ivana">Ivana</option>
                    <option value="katia">Kátia</option>
                    <option value="Luane">Luane</option>
                    <option value="Marcia">Márcia</option>
                    <option value="Olisses">Olisses</option>
                    <option value="Regiane">Regiane</option>
                    <option value="Rosangela">Rosângela</option>
                    <option value="Sirleia">Sirléia</option>
                </select>
            </div>

            <div class="filter-group">
                <label>De:</label>
                <input type="date" id="filtroDataInicio">
            </div>

            <div class="filter-group">
                <label>Até:</label>
                <input type="date" id="filtroDataFim">
            </div>

            <button id="btnLimpar">Limpar Filtros</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Data/Hora</th>
                    <th>Vendedora</th>
                    <th>Nota</th>
                    <th>Comentário</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
                <tr><td colspan="4">Carregando dados...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module" src="admin.js?v=2"></script>
</body>
</html>
